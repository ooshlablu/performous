name: Build MacOS Homebrew Packages

on:
  workflow_call:
    inputs:
      package_complete_version:
        description: 'The output of the complete_version of the "determine_version" job from the build_and_release.yml workflow'
        required: true
        type: string
      release_id:
        description: 'The output of the "create_release" job from the build_and_release.yml workflow'
        required: true
        type: string

jobs:
  Homebrew_Package:
    strategy:
      matrix:
        os: [ 'macos-15-intel', 'macos-15' ]
    name: Create MacOS dmg with Homebrew
    runs-on: '${{ matrix.os }}'
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      MACOS_DEPS: >-
        aubio
        boost
        cairo
        cmake
        cpprestsdk
        dylibbundler
        ffmpeg@7
        fftw
        fmt
        fontconfig
        freetype
        glm
        googletest
        help2man
        icu4c
        libepoxy
        librsvg
        libxml++3
        nlohmann-json
        opencv
        openssl
        pango
        pkg-config
        portaudio
        portmidi
        sdl2
    steps:
      - name: Checkout Git
        id: checkout_git
        uses: actions/checkout@v4
        with:
          path: performous

      - name: Update Brew
        id: update_brew
        run: |
          brew update

      - name: Patch cpprestsdk for Boost
        id: patch_cpprestsdk
        run: |
          FORMULA_PATH="$(brew --repo homebrew/core)/Formula/cpprestsdk.rb"
          if [ -f "$FORMULA_PATH" ]; then
            echo "Patching cpprestsdk formula for Boost compatibility..."
            # Download patch if not present
            PATCH_PATH="${{ github.workspace }}/performous/.github/support-boost-1.87.patch"
            # Insert patch step into formula if not already present
            grep -q 'support-boost-1.87.patch' "$FORMULA_PATH" || \
              sed -i.bak "/stable do/a\\
          patch :p1 do\\
            url \"file://$PATCH_PATH\"\\
          end" "$FORMULA_PATH"
          else
            echo "cpprestsdk formula not found, skipping patch."
          fi

      - name: Fetch Dependencies
        id: fetch_deps
        run: |
          brew fetch --deps $MACOS_DEPS

      - name: Install Dependencies
        id: install_deps
        run: |
          brew unlink python || true
          brew link --overwrite python || true
          brew install $MACOS_DEPS

          brew uninstall cmake
          brew tap --force homebrew/core
          brew tap-new --no-git performous/pinned_cmake
          brew extract cmake --version 3.31.6 performous/pinned_cmake
          brew install performous/pinned_cmake/cmake@3.31.6
          brew untap homebrew/core
          brew developer off

      - name: Build package
        id: build_package
        run: |
          cd performous/osx-utils
          chmod +x ./macos-bundler.py
          python3 -m venv ./bundler-venv
          source ./bundler-venv/bin/activate
          pip3 install -r ./macos-bundler-requirements.txt
          python3 ./macos-bundler.py --flat-output --package-version="${{ inputs.package_complete_version }}" --enable-webserver=on --enable-midi=on --enable-webcam=on --build-tests=off --target=12.0 --prefer-homebrew
          PACKAGE_PATH="${{ github.workspace }}/performous/osx-utils/out/Performous-${{ inputs.package_complete_version }}-$(uname -m).dmg"
          MASTER_PACKAGE_PATH="${{ github.workspace }}/performous/osx-utils/out/Performous-master[${{ inputs.package_complete_version }}]-$(uname -m).dmg"
          cp -v ${PACKAGE_PATH} ${MASTER_PACKAGE_PATH}
          echo "artifact_path=${PACKAGE_PATH}" >> ${GITHUB_OUTPUT}
          echo "artifact_name=$(basename ${PACKAGE_PATH})" >> ${GITHUB_OUTPUT}
          echo "master_artifact_path=${MASTER_PACKAGE_PATH}" >> ${GITHUB_OUTPUT}
          echo "master_artifact_name=$(basename ${MASTER_PACKAGE_PATH})" >> ${GITHUB_OUTPUT}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'pull_request' }}
        with:
          name: ${{ steps.build_package.outputs.artifact_name }}
          path: ${{ steps.build_package.outputs.artifact_path }}

      - name: Upload artifact with unified name
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build_package.outputs.master_artifact_name }}
          path: ${{ steps.build_package.outputs.master_artifact_path }}

      - name: Upload artifacts to tagged release
        id: upload_assets
        if: ${{ github.event_name != 'pull_request' && github.ref_type == 'tag' }}
        uses: xresloader/upload-to-github-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_id: ${{ inputs.release_id }}
          file: ${{ steps.build_package.outputs.artifact_path }}
